spring.application.name=api-gateway
server.port=8085

spring.cloud.gateway.server.webmvc.routes[0].id=hotel-service
spring.cloud.gateway.server.webmvc.routes[0].uri=http://localhost:8080
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/v1/hotels/**

spring.cloud.gateway.server.webmvc.routes[1].id=booking-service
spring.cloud.gateway.server.webmvc.routes[1].uri=http://localhost:8081
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/v1/bookings/**